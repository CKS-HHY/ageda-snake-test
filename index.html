<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Knowledge Sphere</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --text: #eef2ff;
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.25);
      --glow: #75b7ff;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      font-family: Inter, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
    }

    #app {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #tooltip {
      position: fixed;
      top: 0;
      left: 0;
      transform: translate(-50%, calc(-100% - 14px));
      padding: 10px 14px;
      border-radius: 12px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.35), 0 0 18px rgba(117, 183, 255, 0.2);
      color: #f8fbff;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.2px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 2;
      white-space: nowrap;
    }

    #tooltip.visible { opacity: 1; }

    #tooltip::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -8px;
      width: 12px;
      height: 12px;
      transform: translateX(-50%) rotate(45deg);
      border-right: 1px solid var(--glass-border);
      border-bottom: 1px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="tooltip" aria-live="polite"></div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.159.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.159.0/examples/jsm/controls/OrbitControls.js';

    // Task 1: Base scene, sphere, rotation, particles
    const app = document.getElementById('app');
    const tooltip = document.getElementById('tooltip');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a1a);

    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(0, 0.4, 5.2);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.enablePan = false;
    controls.minDistance = 3.2;
    controls.maxDistance = 8.5;

    const ambientLight = new THREE.AmbientLight(0x9fb3ff, 0.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xbfd0ff, 1.2);
    directionalLight.position.set(4, 5, 6);
    scene.add(directionalLight);

    const pointLight = new THREE.PointLight(0x76a9ff, 0.8, 14, 2);
    pointLight.position.set(-3, -2, 4);
    scene.add(pointLight);

    const sphereRadius = 1.6;
    const sphereGeometry = new THREE.SphereGeometry(sphereRadius, 96, 96);
    const sphereMaterial = new THREE.MeshPhysicalMaterial({
      color: 0x2f4f8f,
      roughness: 0.25,
      metalness: 0.2,
      transmission: 0.08,
      clearcoat: 0.75,
      clearcoatRoughness: 0.2,
      emissive: 0x12204d,
      emissiveIntensity: 0.65
    });
    const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
    scene.add(sphere);

    const starsCount = 1600;
    const starPositions = new Float32Array(starsCount * 3);

    for (let i = 0; i < starsCount; i++) {
      const i3 = i * 3;
      const radius = 11 + Math.random() * 19;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);

      starPositions[i3] = radius * Math.sin(phi) * Math.cos(theta);
      starPositions[i3 + 1] = radius * Math.cos(phi);
      starPositions[i3 + 2] = radius * Math.sin(phi) * Math.sin(theta);
    }

    const starsGeometry = new THREE.BufferGeometry();
    starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));

    const starsMaterial = new THREE.PointsMaterial({
      color: 0xb9ceff,
      size: 0.045,
      sizeAttenuation: true,
      transparent: true,
      opacity: 0.9,
      blending: THREE.AdditiveBlending,
      depthWrite: false
    });

    const stars = new THREE.Points(starsGeometry, starsMaterial);
    scene.add(stars);

    // Task 2: Interactive nodes, tooltips, click handlers
    const domainNames = [
      'Machine Learning','Data Engineering','Cloud Architecture','Cybersecurity',
      'Computer Vision','Natural Language Processing','DevOps','Robotics',
      'Knowledge Graphs','Quantum Computing','Human-Computer Interaction','Distributed Systems'
    ];

    const nodesGroup = new THREE.Group();
    scene.add(nodesGroup);

    const nodeGeometry = new THREE.SphereGeometry(0.075, 24, 24);
    const nodeSurfaceRadius = sphereRadius + 0.03;
    const tmpColor = new THREE.Color();
    const nodeMaterialList = [];

    for (let i = 0; i < domainNames.length; i++) {
      const t = i / domainNames.length;
      const phi = Math.acos(1 - 2 * (i + 0.5) / domainNames.length);
      const theta = Math.PI * (1 + Math.sqrt(5)) * i;

      const x = nodeSurfaceRadius * Math.sin(phi) * Math.cos(theta);
      const y = nodeSurfaceRadius * Math.cos(phi);
      const z = nodeSurfaceRadius * Math.sin(phi) * Math.sin(theta);

      tmpColor.setHSL(0.56 + t * 0.12, 0.9, 0.66);

      const nodeMaterial = new THREE.MeshStandardMaterial({
        color: tmpColor.clone(),
        emissive: tmpColor.clone(),
        emissiveIntensity: 1.2,
        roughness: 0.2,
        metalness: 0.05
      });

      const node = new THREE.Mesh(nodeGeometry, nodeMaterial);
      node.position.set(x, y, z);
      node.userData = { domain: domainNames[i] };

      const glow = new THREE.PointLight(tmpColor.clone(), 0.8, 1.4, 2);
      glow.position.copy(node.position);
      node.add(glow);

      nodeMaterialList.push(nodeMaterial);
      nodesGroup.add(node);
    }

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    let selectedNode = null;

    function hideTooltip() { tooltip.classList.remove('visible'); }

    function showTooltip(text, clientX, clientY) {
      tooltip.textContent = text;
      tooltip.style.left = `${clientX}px`;
      tooltip.style.top = `${clientY}px`;
      tooltip.classList.add('visible');
    }

    window.addEventListener('pointerdown', (event) => {
      const rect = renderer.domElement.getBoundingClientRect();
      pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects(nodesGroup.children, false);

      if (intersects.length > 0) {
        selectedNode = intersects[0].object;
        showTooltip(selectedNode.userData.domain, event.clientX, event.clientY);
      } else {
        selectedNode = null;
        hideTooltip();
      }
    });

    window.addEventListener('pointermove', (event) => {
      if (!tooltip.classList.contains('visible') || !selectedNode) return;
      tooltip.style.left = `${event.clientX}px`;
      tooltip.style.top = `${event.clientY}px`;
    });

    const clock = new THREE.Clock();

    function animate() {
      const elapsed = clock.getElapsedTime();
      sphere.rotation.y += 0.0023;
      sphere.rotation.x = Math.sin(elapsed * 0.25) * 0.06;
      nodesGroup.rotation.y += 0.0023;
      nodesGroup.rotation.x = sphere.rotation.x;
      stars.rotation.y += 0.0004;
      stars.rotation.x = Math.sin(elapsed * 0.08) * 0.03;

      for (let i = 0; i < nodeMaterialList.length; i++) {
        nodeMaterialList[i].emissiveIntensity = 1 + Math.sin(elapsed * 2 + i * 0.75) * 0.25;
      }

      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    });
  </script>
</body>
</html>
