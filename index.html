<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbital Defense</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }

        #gameCanvas {
            border: 2px solid #00ffcc;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
            max-width: 95vw;
            max-height: 95vh;
        }

        .instructions {
            position: absolute;
            bottom: 20px;
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div class="instructions">SPACE or CLICK to switch orbits. Avoid meteors.</div>
    <script type="module" src="src/main.js"></script>
</body>
</html>
