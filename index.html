<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D Knowledge Sphere</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --text: #f4f8ff;
      --tooltip-bg: rgba(255, 255, 255, 0.12);
      --tooltip-border: rgba(255, 255, 255, 0.25);
      --tooltip-shadow: rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    #app {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 30% 20%, #131337 0%, #0a0a1a 55%, #080816 100%);
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      outline: none;
    }

    #tooltip {
      position: fixed;
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, -120%);
      padding: 10px 14px;
      border-radius: 12px;
      background: var(--tooltip-bg);
      border: 1px solid var(--tooltip-border);
      box-shadow: 0 12px 40px var(--tooltip-shadow);
      backdrop-filter: blur(12px) saturate(130%);
      -webkit-backdrop-filter: blur(12px) saturate(130%);
      color: #ffffff;
      font-size: 0.92rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      transition: opacity 0.2s ease;
      white-space: nowrap;
      z-index: 20;
    }

    #tooltip::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -8px;
      transform: translateX(-50%) rotate(45deg);
      width: 12px;
      height: 12px;
      background: var(--tooltip-bg);
      border-right: 1px solid var(--tooltip-border);
      border-bottom: 1px solid var(--tooltip-border);
      backdrop-filter: blur(12px) saturate(130%);
      -webkit-backdrop-filter: blur(12px) saturate(130%);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="tooltip" aria-live="polite"></div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.161.0/examples/jsm/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const tooltip = document.getElementById('tooltip');

    const scene = new THREE.Scene();
    scene.background = new THREE.Color('#0a0a1a');

    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(0, 0.6, 7.5);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;
    controls.minDistance = 3.5;
    controls.maxDistance = 15;

    const ambientLight = new THREE.AmbientLight(0xb7c8ff, 0.45);
    scene.add(ambientLight);

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
    keyLight.position.set(5, 4, 6);
    scene.add(keyLight);

    const fillLight = new THREE.PointLight(0x6ba4ff, 1.1, 40, 2);
    fillLight.position.set(-4, -2, -6);
    scene.add(fillLight);

    const sphereRadius = 2.1;
    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(sphereRadius, 64, 64),
      new THREE.MeshPhysicalMaterial({
        color: 0x2f7cff,
        roughness: 0.25,
        metalness: 0.35,
        clearcoat: 0.75,
        clearcoatRoughness: 0.2,
        transmission: 0.15,
        opacity: 0.95,
        transparent: true,
        emissive: 0x0f1c66,
        emissiveIntensity: 0.45
      })
    );
    scene.add(sphere);

    const starCount = 1800;
    const starPositions = new Float32Array(starCount * 3);
    const starSizes = new Float32Array(starCount);

    for (let i = 0; i < starCount; i++) {
      const i3 = i * 3;
      const r = 35 + Math.random() * 80;
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);

      starPositions[i3] = r * Math.sin(phi) * Math.cos(theta);
      starPositions[i3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      starPositions[i3 + 2] = r * Math.cos(phi);
      starSizes[i] = 0.8 + Math.random() * 1.6;
    }

    const starsGeometry = new THREE.BufferGeometry();
    starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
    starsGeometry.setAttribute('size', new THREE.BufferAttribute(starSizes, 1));

    const starsMaterial = new THREE.PointsMaterial({
      color: 0xbfd3ff,
      size: 0.09,
      transparent: true,
      opacity: 0.9,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
      sizeAttenuation: true
    });

    const stars = new THREE.Points(starsGeometry, starsMaterial);
    scene.add(stars);

    const domainNames = [
      'Machine Learning',
      'Knowledge Graphs',
      'Distributed Systems',
      'Cybersecurity',
      'Natural Language',
      'Computer Vision',
      'Data Engineering',
      'Cloud Infrastructure',
      'Robotics',
      'Quantum Computing',
      'Human-Computer Interaction',
      'Bioinformatics'
    ];

    const nodeGroup = new THREE.Group();
    sphere.add(nodeGroup);

    const nodeGeometry = new THREE.SphereGeometry(0.08, 20, 20);
    const nodeMaterial = new THREE.MeshStandardMaterial({
      color: 0x88c5ff,
      emissive: 0x4ea4ff,
      emissiveIntensity: 1.8,
      roughness: 0.2,
      metalness: 0.15
    });

    const nodeHaloGeometry = new THREE.SphereGeometry(0.14, 18, 18);
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();

    const nodes = [];
    const selected = { mesh: null };

    function fibonacciSpherePoint(index, total) {
      const offset = 2 / total;
      const increment = Math.PI * (3 - Math.sqrt(5));
      const y = ((index * offset) - 1) + (offset / 2);
      const r = Math.sqrt(1 - y * y);
      const phi = index * increment;
      const x = Math.cos(phi) * r;
      const z = Math.sin(phi) * r;
      return new THREE.Vector3(x, y, z);
    }

    domainNames.forEach((name, i) => {
      const position = fibonacciSpherePoint(i, domainNames.length).multiplyScalar(sphereRadius + 0.02);

      const node = new THREE.Mesh(nodeGeometry, nodeMaterial.clone());
      node.position.copy(position);
      node.userData = { domain: name, baseScale: 1 };

      const halo = new THREE.Mesh(
        nodeHaloGeometry,
        new THREE.MeshBasicMaterial({
          color: 0x6fb6ff,
          transparent: true,
          opacity: 0.2,
          blending: THREE.AdditiveBlending,
          depthWrite: false
        })
      );
      node.add(halo);

      nodeGroup.add(node);
      nodes.push(node);
    });

    function hideTooltip() {
      tooltip.style.opacity = '0';
      selected.mesh = null;
    }

    function showTooltip(node) {
      selected.mesh = node;
      tooltip.textContent = node.userData.domain;
      tooltip.style.opacity = '1';
      updateTooltipPosition();
    }

    const screenPos = new THREE.Vector3();
    function updateTooltipPosition() {
      if (!selected.mesh) return;
      selected.mesh.getWorldPosition(screenPos);
      screenPos.project(camera);

      const x = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-screenPos.y * 0.5 + 0.5) * window.innerHeight;

      tooltip.style.left = `${x}px`;
      tooltip.style.top = `${y - 16}px`;

      const isBehind = screenPos.z > 1;
      tooltip.style.opacity = isBehind ? '0' : '1';
    }

    function onPointerClick(event) {
      pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const intersects = raycaster.intersectObjects(nodes, false);

      if (intersects.length > 0) {
        showTooltip(intersects[0].object);
      } else {
        hideTooltip();
      }
    }

    renderer.domElement.addEventListener('pointerdown', onPointerClick);

    const clock = new THREE.Clock();

    function animate() {
      const t = clock.getElapsedTime();

      sphere.rotation.y += 0.0025;
      sphere.rotation.x = Math.sin(t * 0.25) * 0.08;

      stars.rotation.y += 0.00025;
      stars.rotation.x = Math.sin(t * 0.07) * 0.02;

      for (let i = 0; i < nodes.length; i++) {
        const node = nodes[i];
        const pulse = 1 + Math.sin(t * 2.4 + i * 0.7) * 0.12;
        node.scale.setScalar(selected.mesh === node ? 1.45 : pulse);
      }

      controls.update();
      updateTooltipPosition();
      renderer.render(scene, camera);
    }

    renderer.setAnimationLoop(animate);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      updateTooltipPosition();
    });

    renderer.domElement.addEventListener('pointerleave', () => {
      if (!selected.mesh) tooltip.style.opacity = '0';
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') hideTooltip();
    });
  </script>
</body>
</html>
