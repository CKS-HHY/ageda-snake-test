<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Retro Snake Arcade</title>
    <style>
        :root {
            --bg-color: #1a1a1a;
            --panel-color: #2a2a2a;
            --accent-color: #00ff41;
            --text-color: #00ff41;
            --danger-color: #ff3e3e;
            --font-main: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: none;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            border: 4px solid var(--panel-color);
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.2);
            background: #000;
        }

        canvas {
            display: block;
            image-rendering: pixelated;
        }

        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        .hidden {
            display: none !important;
        }

        .hud {
            position: absolute;
            top: -40px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 2px 2px var(--danger-color);
        }

        .btn {
            background: transparent;
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            padding: 10px 20px;
            font-size: 1.5rem;
            font-family: var(--font-main);
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 1rem;
        }

        .btn:hover {
            background: var(--accent-color);
            color: #000;
        }

        #controls-hint {
            margin-top: 1rem;
            font-size: 0.8rem;
            opacity: 0.7;
        }

        .mobile-controls {
            display: grid;
            grid-template-areas: 
                ". up ."
                "left . right"
                ". down .";
            gap: 10px;
            margin-top: 20px;
        }

        .control-btn {
            width: 60px;
            height: 60px;
            background: rgba(42, 42, 42, 0.5);
            border: 2px solid var(--accent-color);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-color);
            font-weight: bold;
            border-radius: 5px;
        }

        @media (min-width: 768px) {
            .mobile-controls {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="hud">
            <div>Score: <span id="score">0</span></div>
            <div>Hi-Score: <span id="high-score">0</span></div>
        </div>
        <canvas id="gameCanvas"></canvas>
        <div id="ui-overlay">
            <h1 id="overlay-title">SNAKE</h1>
            <p id="final-score" class="hidden">Final Score: 0</p>
            <button id="start-btn" class="btn">START GAME</button>
            <div id="controls-hint">ARROWS / WASD TO MOVE</div>
        </div>
    </div>

    <div class="mobile-controls">
        <div class="control-btn" style="grid-area: up" id="ctrl-up">↑</div>
        <div class="control-btn" style="grid-area: left" id="ctrl-left">←</div>
        <div class="control-btn" style="grid-area: right" id="ctrl-right">→</div>
        <div class="control-btn" style="grid-area: down" id="ctrl-down">↓</div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highscoreElement = document.getElementById('high-score');
        const overlay = document.getElementById('ui-overlay');
        const startBtn = document.getElementById('start-btn');
        const overlayTitle = document.getElementById('overlay-title');
        const finalScoreText = document.getElementById('final-score');

        // Game Configuration
        const GRID_SIZE = 20;
        let tileCountX, tileCountY;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop;
        let snake = [];
        let food = { x: 5, y: 5 };
        let dx = 0;
        let dy = 0;
        let nextDx = 0;
        let nextDy = 0;
        let speed = 7;
        let lastTime = 0;
        let isGameOver = false;

        function initCanvas() {
            const size = Math.min(window.innerWidth - 40, 400);
            canvas.width = size;
            canvas.height = size;
            tileCountX = canvas.width / GRID_SIZE;
            tileCountY = canvas.height / GRID_SIZE;
        }

        window.addEventListener('resize', initCanvas);
        initCanvas();
        highscoreElement.innerText = highScore;

        function resetGame() {
            snake = [
                { x: Math.floor(tileCountX / 2), y: Math.floor(tileCountY / 2) },
                { x: Math.floor(tileCountX / 2), y: Math.floor(tileCountY / 2) + 1 },
                { x: Math.floor(tileCountX / 2), y: Math.floor(tileCountY / 2) + 2 }
            ];
            dx = 0;
            dy = -1;
            nextDx = 0;
            nextDy = -1;
            score = 0;
            speed = 7;
            isGameOver = false;
            scoreElement.innerText = score;
            spawnFood();
        }

        function spawnFood() {
            food.x = Math.floor(Math.random() * tileCountX);
            food.y = Math.floor(Math.random() * tileCountY);
            // Don't spawn on snake
            for (let part of snake) {
                if (part.x === food.x && part.y === food.y) return spawnFood();
            }
        }

        function handleInput(e) {
            const key = e.key.toLowerCase();
            if ((key === 'arrowup' || key === 'w') && dy !== 1) { nextDx = 0; nextDy = -1; }
            if ((key === 'arrowdown' || key === 's') && dy !== -1) { nextDx = 0; nextDy = 1; }
            if ((key === 'arrowleft' || key === 'a') && dx !== 1) { nextDx = -1; nextDy = 0; }
            if ((key === 'arrowright' || key === 'd') && dx !== -1) { nextDx = 1; nextDy = 0; }
        }

        window.addEventListener('keydown', handleInput);

        // Touch/Mobile controls
        const touchBtns = {
            'ctrl-up': { dx: 0, dy: -1, prev: 1, axis: 'dy' },
            'ctrl-down': { dx: 0, dy: 1, prev: -1, axis: 'dy' },
            'ctrl-left': { dx: -1, dy: 0, prev: 1, axis: 'dx' },
            'ctrl-right': { dx: 1, dy: 0, prev: -1, axis: 'dx' }
        };

        Object.keys(touchBtns).forEach(id => {
            document.getElementById(id).addEventListener('touchstart', (e) => {
                e.preventDefault();
                const config = touchBtns[id];
                if (window[config.axis] !== config.prev) {
                    nextDx = config.dx;
                    nextDy = config.dy;
                }
            });
        });

        function update() {
            dx = nextDx;
            dy = nextDy;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            // Wall collision
            if (head.x < 0 || head.x >= tileCountX || head.y < 0 || head.y >= tileCountY) {
                return gameOver();
            }

            // Self collision
            for (let part of snake) {
                if (head.x === part.x && head.y === part.y) return gameOver();
            }

            snake.unshift(head);

            // Food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('snakeHighScore', highScore);
                    highscoreElement.innerText = highScore;
                }
                speed = Math.min(20, 7 + Math.floor(score / 50));
                spawnFood();
            } else {
                snake.pop();
            }
        }

        function draw() {
            // Background
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Grid lines (subtle)
            ctx.strokeStyle = '#111';
            for(let i=0; i<canvas.width; i+=GRID_SIZE) {
                ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // Food
            ctx.fillStyle = '#ff3e3e';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff3e3e';
            ctx.fillRect(food.x * GRID_SIZE + 2, food.y * GRID_SIZE + 2, GRID_SIZE - 4, GRID_SIZE - 4);
            ctx.shadowBlur = 0;

            // Snake
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? '#fff' : '#00ff41';
                ctx.fillRect(part.x * GRID_SIZE + 1, part.y * GRID_SIZE + 1, GRID_SIZE - 2, GRID_SIZE - 2);
                
                // Eyes for head
                if(index === 0) {
                    ctx.fillStyle = '#000';
                    if(dx !== 0) {
                        ctx.fillRect(part.x * GRID_SIZE + 10, part.y * GRID_SIZE + 5, 2, 2);
                        ctx.fillRect(part.x * GRID_SIZE + 10, part.y * GRID_SIZE + 13, 2, 2);
                    } else {
                        ctx.fillRect(part.x * GRID_SIZE + 5, part.y * GRID_SIZE + 10, 2, 2);
                        ctx.fillRect(part.x * GRID_SIZE + 13, part.y * GRID_SIZE + 10, 2, 2);
                    }
                }
            });
        }

        function gameOver() {
            isGameOver = true;
            overlayTitle.innerText = "GAME OVER";
            finalScoreText.innerText = `Final Score: ${score}`;
            finalScoreText.classList.remove('hidden');
            startBtn.innerText = "RETRY";
            overlay.classList.remove('hidden');
        }

        function gameLoopFn(timestamp) {
            if (isGameOver) return;

            const elapsed = timestamp - lastTime;
            const interval = 1000 / speed;

            if (elapsed > interval) {
                update();
                draw();
                lastTime = timestamp;
            }
            requestAnimationFrame(gameLoopFn);
        }

        startBtn.addEventListener('click', () => {
            overlay.classList.add('hidden');
            resetGame();
            lastTime = performance.now();
            requestAnimationFrame(gameLoopFn);
        });

        // Initial draw
        draw();
    </script>
</body>
</html>
