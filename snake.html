<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake Game — AGEDA v5.3.1 Functional Test</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #1a1a2e; font-family: 'Segoe UI', sans-serif;
  }
  .container { text-align: center; }
  h1 { color: #e94560; margin-bottom: 10px; font-size: 2rem; }
  #score { color: #0f3460; background: #e94560; padding: 5px 20px;
           border-radius: 20px; display: inline-block; margin-bottom: 10px;
           font-weight: bold; font-size: 1.2rem; }
  canvas { border: 3px solid #e94560; border-radius: 8px;
           background: #16213e; display: block; margin: 0 auto; }
  #game-over { color: #e94560; font-size: 1.5rem; margin-top: 15px;
               display: none; }
</style>
</head>
<body>
<div class="container">
  <h1>🐍 Snake</h1>
  <div id="score">Score: 0</div>
  <canvas id="game" width="400" height="400"></canvas>
  <div id="game-over">Game Over! Press Space to restart</div>
</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const gameOverEl = document.getElementById('game-over');
const GRID = 20, CELL = canvas.width / GRID;
let snake, food, dir, score, gameLoop, running;

function init() {
  snake = [{x: 10, y: 10}];
  dir = {x: 1, y: 0};
  score = 0;
  running = true;
  gameOverEl.style.display = 'none';
  scoreEl.textContent = 'Score: 0';
  placeFood();
  if (gameLoop) clearInterval(gameLoop);
  gameLoop = setInterval(update, 120);
}

function placeFood() {
  do {
    food = {x: Math.floor(Math.random()*GRID), y: Math.floor(Math.random()*GRID)};
  } while (snake.some(s => s.x === food.x && s.y === food.y));
}

function update() {
  if (!running) return;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x < 0 || head.x >= GRID || head.y < 0 || head.y >= GRID ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    running = false;
    gameOverEl.style.display = 'block';
    clearInterval(gameLoop);
    return;
  }
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    scoreEl.textContent = 'Score: ' + score;
    placeFood();
  } else { snake.pop(); }
  draw();
}

function draw() {
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  // Draw grid
  ctx.strokeStyle = '#1a1a3e';
  for (let i = 0; i < GRID; i++) {
    ctx.beginPath(); ctx.moveTo(i*CELL,0); ctx.lineTo(i*CELL,canvas.height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,i*CELL); ctx.lineTo(canvas.width,i*CELL); ctx.stroke();
  }
  // Draw snake
  snake.forEach((s, i) => {
    ctx.fillStyle = i === 0 ? '#e94560' : '#0f3460';
    ctx.fillRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2);
    ctx.strokeStyle = '#e94560';
    ctx.strokeRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2);
  });
  // Draw food
  ctx.fillStyle = '#00d2ff';
  ctx.beginPath();
  ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2-2, 0, Math.PI*2);
  ctx.fill();
}

document.addEventListener('keydown', e => {
  const map = {ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1},
               ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0}};
  if (map[e.key] && !(map[e.key].x === -dir.x && map[e.key].y === -dir.y))
    dir = map[e.key];
  if (e.code === 'Space' && !running) init();
});

init();
</script>
</body>
</html>
