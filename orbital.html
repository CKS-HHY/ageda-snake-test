<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orbital Survivor</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        canvas {
            background-color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            border: 1px solid #333;
            max-width: 100%;
            max-height: 80vh;
        }
        #ui {
            margin-top: 10px;
            text-align: center;
        }
        .stats {
            font-size: 1.2rem;
            margin-bottom: 5px;
        }
        #instructions {
            color: #888;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="stats">
        Score: <span id="score">0</span> | Difficulty: <span id="difficulty">1</span>
    </div>
    <canvas id="gameCanvas"></canvas>
    <div id="ui">
        <div id="instructions">Click or Space to switch orbits. Avoid meteorites.</div>
    </div>

    <script type="module" src="src/main.js"></script>
</body>
</html>
