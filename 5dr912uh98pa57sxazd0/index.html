<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Interactive Knowledge Sphere</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --text: #e8ecff;
      --accent: #7dd3fc;
      --glass-bg: rgba(255, 255, 255, 0.1);
      --glass-border: rgba(255, 255, 255, 0.22);
      --shadow: rgba(125, 211, 252, 0.25);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.12), transparent 32%),
        radial-gradient(circle at 80% 80%, rgba(168, 85, 247, 0.14), transparent 36%),
        var(--bg);
    }

    #tooltip {
      position: fixed;
      transform: translate(-50%, calc(-100% - 18px));
      padding: 10px 14px;
      border-radius: 12px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      color: var(--text);
      letter-spacing: 0.2px;
      font-size: 14px;
      white-space: nowrap;
      box-shadow: 0 8px 28px var(--shadow);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s ease;
      z-index: 10;
    }

    #tooltip.visible {
      opacity: 1;
    }

    #tooltip::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -8px;
      transform: translateX(-50%) rotate(45deg);
      width: 12px;
      height: 12px;
      border-right: 1px solid var(--glass-border);
      border-bottom: 1px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="tooltip" role="status" aria-live="polite"></div>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const tooltip = document.getElementById('tooltip');

    // =========================
    // Task 1: Base scene setup
    // =========================
    const scene = new THREE.Scene();

    const camera = new THREE.PerspectiveCamera(
      55,
      window.innerWidth / window.innerHeight,
      0.1,
      1000
    );
    camera.position.set(0, 0.8, 7.2);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.055;
    controls.rotateSpeed = 0.6;
    controls.enablePan = false;
    controls.minDistance = 4.5;
    controls.maxDistance = 12;

    const ambientLight = new THREE.AmbientLight(0xa7b9ff, 0.52);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 0.95);
    directionalLight.position.set(5, 6, 4);
    scene.add(directionalLight);

    const pointLight = new THREE.PointLight(0x60a5fa, 1.1, 60, 2);
    pointLight.position.set(-6, -2, 5);
    scene.add(pointLight);

    const sphereGroup = new THREE.Group();
    scene.add(sphereGroup);

    const sphereGeometry = new THREE.SphereGeometry(2, 96, 96);
    const sphereMaterial = new THREE.MeshPhysicalMaterial({
      color: 0x112245,
      emissive: 0x0f2f6a,
      emissiveIntensity: 0.22,
      roughness: 0.32,
      metalness: 0.35,
      clearcoat: 0.4,
      clearcoatRoughness: 0.22,
      transparent: true,
      opacity: 0.96
    });
    const sphere = new THREE.Mesh(sphereGeometry, sphereMaterial);
    sphereGroup.add(sphere);

    const haloGeometry = new THREE.SphereGeometry(2.1, 64, 64);
    const haloMaterial = new THREE.MeshBasicMaterial({
      color: 0x60a5fa,
      transparent: true,
      opacity: 0.08,
      side: THREE.BackSide
    });
    const halo = new THREE.Mesh(haloGeometry, haloMaterial);
    sphereGroup.add(halo);

    // Animated particle stars
    const starCount = 1400;
    const starPositions = new Float32Array(starCount * 3);
    const starSeeds = new Float32Array(starCount);

    for (let i = 0; i < starCount; i += 1) {
      const i3 = i * 3;
      starPositions[i3] = THREE.MathUtils.randFloatSpread(140);
      starPositions[i3 + 1] = THREE.MathUtils.randFloatSpread(90);
      starPositions[i3 + 2] = THREE.MathUtils.randFloatSpread(140);
      starSeeds[i] = Math.random() * Math.PI * 2;
    }

    const starGeometry = new THREE.BufferGeometry();
    starGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));

    const starMaterial = new THREE.PointsMaterial({
      color: 0xc7d2fe,
      size: 0.11,
      sizeAttenuation: true,
      transparent: true,
      opacity: 0.82,
      depthWrite: false
    });

    const stars = new THREE.Points(starGeometry, starMaterial);
    scene.add(stars);

    // ==========================================
    // Task 2: Interactive knowledge domain nodes
    // ==========================================
    const domains = [
      'Mathematics',
      'Physics',
      'Biology',
      'Chemistry',
      'Computer Science',
      'Astronomy',
      'Philosophy',
      'Psychology',
      'Linguistics',
      'Economics',
      'History',
      'Art & Design'
    ];

    const nodesGroup = new THREE.Group();
    sphereGroup.add(nodesGroup);

    const nodeGeometry = new THREE.SphereGeometry(0.075, 24, 24);
    const glowTexture = (() => {
      const size = 128;
      const canvas = document.createElement('canvas');
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');
      const gradient = ctx.createRadialGradient(size / 2, size / 2, 8, size / 2, size / 2, size / 2);
      gradient.addColorStop(0, 'rgba(255,255,255,1)');
      gradient.addColorStop(0.35, 'rgba(125,211,252,0.95)');
      gradient.addColorStop(1, 'rgba(125,211,252,0)');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, size, size);
      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      return texture;
    })();

    const nodeMeshes = [];

    function fibonacciSpherePoint(index, total, radius) {
      const goldenAngle = Math.PI * (3 - Math.sqrt(5));
      const y = 1 - (index / (total - 1)) * 2;
      const r = Math.sqrt(1 - y * y);
      const theta = goldenAngle * index;
      const x = Math.cos(theta) * r;
      const z = Math.sin(theta) * r;
      return new THREE.Vector3(x * radius, y * radius, z * radius);
    }

    domains.forEach((domain, i) => {
      const nodeMaterial = new THREE.MeshStandardMaterial({
        color: 0x7dd3fc,
        emissive: 0x38bdf8,
        emissiveIntensity: 1.05,
        roughness: 0.2,
        metalness: 0.1
      });

      const node = new THREE.Mesh(nodeGeometry, nodeMaterial);
      node.position.copy(fibonacciSpherePoint(i, domains.length, 2.08));
      node.userData = { domain };
      nodesGroup.add(node);
      nodeMeshes.push(node);

      const glow = new THREE.Sprite(new THREE.SpriteMaterial({
        map: glowTexture,
        color: 0x7dd3fc,
        transparent: true,
        opacity: 0.85,
        depthWrite: false
      }));
      glow.scale.set(0.34, 0.34, 0.34);
      glow.position.copy(node.position);
      nodesGroup.add(glow);
    });

    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    let selectedNode = null;

    function hideTooltip() {
      selectedNode = null;
      tooltip.classList.remove('visible');
      tooltip.textContent = '';
    }

    function updateTooltipPosition() {
      if (!selectedNode) return;
      const worldPos = selectedNode.getWorldPosition(new THREE.Vector3());
      const projected = worldPos.project(camera);

      const x = (projected.x * 0.5 + 0.5) * window.innerWidth;
      const y = (-projected.y * 0.5 + 0.5) * window.innerHeight;

      if (projected.z > 1 || projected.z < -1) {
        tooltip.classList.remove('visible');
      } else {
        tooltip.style.left = `${x}px`;
        tooltip.style.top = `${y}px`;
        tooltip.classList.add('visible');
      }
    }

    function handlePointerClick(event) {
      pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;

      raycaster.setFromCamera(pointer, camera);
      const intersections = raycaster.intersectObjects(nodeMeshes, false);

      if (intersections.length > 0) {
        selectedNode = intersections[0].object;
        tooltip.textContent = selectedNode.userData.domain;
        updateTooltipPosition();
      } else {
        hideTooltip();
      }
    }

    window.addEventListener('click', handlePointerClick, { passive: true });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      updateTooltipPosition();
    });

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);

      const elapsed = clock.getElapsedTime();

      // Sphere auto-rotation
      sphereGroup.rotation.y += 0.0029;
      sphereGroup.rotation.x = Math.sin(elapsed * 0.3) * 0.09;

      // Node pulse animation
      for (let i = 0; i < nodeMeshes.length; i += 1) {
        const node = nodeMeshes[i];
        const pulse = 1 + Math.sin(elapsed * 2.3 + i * 0.7) * 0.08;
        node.scale.setScalar(pulse);
      }

      // Star twinkle + drift
      const posAttr = starGeometry.getAttribute('position');
      for (let i = 0; i < starCount; i += 1) {
        const i3 = i * 3;
        posAttr.array[i3 + 1] += Math.sin(elapsed * 0.35 + starSeeds[i]) * 0.0009;
      }
      posAttr.needsUpdate = true;
      starMaterial.opacity = 0.62 + Math.sin(elapsed * 0.8) * 0.1;

      controls.update();
      updateTooltipPosition();
      renderer.render(scene, camera);
    }

    animate();
  </script>
</body>
</html>
